<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Klivvr Scripts</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black:  #080808;
  --g9:     #111111;
  --g8:     #1a1a1a;
  --g7:     #242424;
  --g6:     #2e2e2e;
  --g5:     #3d3d3d;
  --g4:     #5a5a5a;
  --g3:     #888888;
  --g2:     #b8b8b8;
  --g1:     #e0e0e0;
  --white:  #f5f5f5;
  --teal:   #7ecece;
  --teal-d: rgba(126,206,206,.1);
  --danger: #cc5555;
  --ok:     #5aaa7a;
  --mono:   'DM Mono', monospace;
  --sans:   'Outfit', sans-serif;

  /* category accent colors */
  --cat-available:   #b39ddb;  /* pastel purple */
  --cat-general:     #7ecece;  /* pastel teal-blue */
  --cat-unavailable: #ef9a9a;  /* pastel red */
  --cat-available-d:   rgba(179,157,219,.1);
  --cat-general-d:     rgba(126,206,206,.1);
  --cat-unavailable-d: rgba(239,154,154,.1);
}
html, body { height: 100%; font-family: var(--mono); font-size: 13px; color: var(--g1); background: var(--black); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--g6); border-radius: 99px; }
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px; height: 52px; flex-shrink: 0;
  background: var(--g9); border-bottom: 1px solid var(--g7);
}
.brand { display: flex; align-items: center; gap: 8px; }
.brand-icon { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--g5); display: flex; align-items: center; justify-content: center; }
.brand-icon svg { width: 13px; height: 13px; fill: var(--teal); }
.brand-name { font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--white); letter-spacing: -0.2px; }
.vr { width: 1px; height: 18px; background: var(--g7); flex-shrink: 0; }
#sheet-label { font-size: 11px; color: var(--g3); max-width: 200px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.spacer { flex: 1; }
#conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--g5); transition: background .3s, box-shadow .3s; flex-shrink: 0; }
#conn-dot.ok  { background: var(--teal); box-shadow: 0 0 6px var(--teal); }
#conn-dot.err { background: var(--danger); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  border: 1px solid var(--g6); border-radius: 8px;
  padding: 6px 14px; font-family: var(--mono); font-size: 11px;
  background: var(--g8); color: var(--g2); cursor: pointer;
  transition: border-color .12s, color .12s, background .12s;
  white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
.btn:hover { border-color: var(--g4); color: var(--white); background: var(--g7); }
.btn.primary { background: var(--teal); border-color: var(--teal); color: var(--black); font-weight: 500; }
.btn.primary:hover { background: #9cdede; border-color: #9cdede; }
.btn.danger { background: transparent; border-color: var(--g6); color: var(--danger); }
.btn.danger:hover { border-color: var(--danger); background: rgba(204,85,85,.07); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--g3); }
.btn.ghost:hover { background: var(--g8); border-color: var(--g6); color: var(--g1); }
.btn.sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; }
.btn.icon { width: 28px; height: 28px; padding: 0; border-radius: 6px; }
.btn:disabled { opacity: .3; cursor: not-allowed; pointer-events: none; }

/* ── ERROR ── */
#error-screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:40px; text-align:center; }
#error-screen h2 { font-family:var(--sans); font-size:16px; font-weight:600; color:var(--danger); }
#error-screen p  { color:var(--g3); font-size:12px; line-height:1.8; max-width:400px; }
#error-screen code { color:var(--teal); background:var(--g8); padding:1px 6px; border-radius:4px; }

/* ── MAIN ── */
#main-view { display:none; flex-direction:column; flex:1; overflow:hidden; }

/* ── TOOLBAR ── */
#toolbar {
  display:flex; align-items:center; gap:8px;
  padding:9px 16px; flex-shrink:0;
  background:var(--g9); border-bottom:1px solid var(--g7);
}
#search-wrap { position:relative; flex:1; max-width:240px; }
#search-wrap input {
  width:100%; background:var(--black); border:1px solid var(--g7);
  border-radius:6px; color:var(--g1); font-family:var(--mono); font-size:12px;
  padding:6px 10px 6px 30px; outline:none; transition:border-color .12s;
}
#search-wrap input:focus { border-color:var(--teal); }
#search-wrap input::placeholder { color:var(--g5); }
.s-ico { position:absolute; left:9px; top:50%; transform:translateY(-50%); color:var(--g4); pointer-events:none; }
#row-count { font-size:11px; color:var(--g4); margin-left:auto; white-space:nowrap; }

/* ── SCROLL AREA ── */
#scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* ── GROUPS ── */
.group { border-bottom:1px solid var(--g7); }
.group-header {
  display:flex; align-items:center; gap:10px;
  padding:11px 18px; cursor:pointer;
  background:var(--g9); position:sticky; top:0; z-index:5;
  border-bottom:1px solid var(--g7);
  user-select:none; -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.group-header:hover { background:var(--g8); }
.g-swatch { width:9px; height:9px; border-radius:3px; flex-shrink:0; }
.g-name { font-family:var(--sans); font-size:13px; font-weight:600; color:var(--white); flex:1; }
.g-count { font-size:11px; color:var(--g4); }
.g-chev { font-size:11px; color:var(--g4); transition:transform .2s; flex-shrink:0; }
.group.open .g-chev { transform:rotate(90deg); }
.group-body { display:none; }
.group.open .group-body { display:block; }

/* ── TABLE ── */
table { width:100%; border-collapse:collapse; }
thead th {
  padding:8px 16px; background:var(--g8); border-bottom:1px solid var(--g7);
  color:var(--g4); font-size:10px; font-weight:400; letter-spacing:.9px;
  text-transform:uppercase; text-align:center; white-space:nowrap;
  user-select:none; cursor:pointer; transition:color .12s;
}
thead th:hover { color:var(--g2); }
thead th.sorted { color:var(--teal); }
thead th:first-child { width:36px; cursor:default; }
thead th:last-child  { width:72px; cursor:default; }
.sa { margin-left:3px; opacity:.3; font-size:9px; }
.sa.on { opacity:1; }
tbody tr { border-bottom:1px solid var(--g8); transition:background .08s; }
tbody tr:hover { background:var(--g8); }
tbody td {
  padding:10px 16px; font-size:12px; color:var(--g2);
  white-space:pre-wrap; word-break:break-word;
  text-align:center; vertical-align:middle;
  cursor:pointer; transition:color .1s; position:relative;
}
tbody td:hover { color:var(--white); }
tbody td.rn { color:var(--g5); font-size:10px; width:36px; cursor:default; pointer-events:none; white-space:nowrap; }
tbody td.act { cursor:default; width:72px; white-space:nowrap; pointer-events:none; }
tbody td.act * { pointer-events:all; }
/* copy flash */
tbody td.copied { color:var(--teal) !important; }
tbody td.copied::after { content:'✓'; position:absolute; right:5px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--teal); animation:fo .7s forwards; }
@keyframes fo { 0%,60%{opacity:1} 100%{opacity:0} }
.cat-dot { display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:7px; vertical-align:middle; position:relative; top:-1px; }

#empty-state { display:none; flex-direction:column; align-items:center; justify-content:center; padding:80px 32px; gap:8px; color:var(--g5); }

/* ── MOBILE CARDS ── */
@media (max-width:639px) {
  #topbar { padding:0 14px; height:48px; }
  #sheet-label { display:none; }
  .vr { display:none; }
  #toolbar { padding:8px 12px; gap:6px; }
  #search-wrap { max-width:none; }
  table { display:none; }
  .mob-cards { display:flex; flex-direction:column; }
  .row-card { border-bottom:1px solid var(--g8); padding:12px 14px; display:flex; flex-direction:column; gap:8px; }
  .card-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .card-name { font-family:var(--sans); font-size:13px; font-weight:600; color:var(--white); cursor:pointer; }
  .card-acts { display:flex; gap:4px; flex-shrink:0; }
  .card-fields { display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; }
  .cf-label { font-size:9px; color:var(--g4); text-transform:uppercase; letter-spacing:.7px; margin-bottom:2px; }
  .cf-val { font-size:12px; color:var(--g2); white-space:pre-wrap; word-break:break-word; cursor:pointer; }
  .cf-val:active { color:var(--teal); }
  .cf-val.empty { color:var(--g5); font-style:italic; }
}
@media (min-width:640px) { .mob-cards { display:none !important; } #fab { display:none !important; } }

#fab { display:none !important; }

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; background:rgba(8,8,8,.88); backdrop-filter:blur(6px);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:200;
}
.spinner { width:26px; height:26px; border:1.5px solid var(--g7); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loader p { color:var(--g4); font-size:12px; }

/* ── MODALS ── */
.overlay {
  position:fixed; inset:0; background:rgba(8,8,8,.82); backdrop-filter:blur(4px);
  display:none; align-items:flex-end; justify-content:center; z-index:100;
}
.overlay.open { display:flex; animation:fi .13s ease; }
@keyframes fi { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--g9); border:1px solid var(--g7);
  border-radius:14px 14px 0 0; width:100%; max-height:92dvh;
  overflow-y:auto; display:flex; flex-direction:column;
  animation:su .2s cubic-bezier(.22,1,.36,1);
}
@keyframes su { from{transform:translateY(100%)} to{transform:none} }
@media (min-width:640px) {
  .overlay { align-items:center; padding:20px; }
  .modal { border-radius:12px; max-width:480px; animation:pi .16s ease; }
  .modal.sm { max-width:360px; }
  @keyframes pi { from{transform:scale(.97);opacity:0} to{transform:none;opacity:1} }
}
.drag-handle { width:32px; height:3px; border-radius:99px; background:var(--g7); margin:10px auto 2px; flex-shrink:0; }
@media (min-width:640px) { .drag-handle { display:none; } }
.modal-head { padding:16px 20px 14px; border-bottom:1px solid var(--g8); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.modal-head h2 { font-family:var(--sans); font-size:14px; font-weight:600; color:var(--white); flex:1; }
.modal-body { padding:16px 20px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.modal-foot { padding:14px 20px; padding-bottom:max(14px, env(safe-area-inset-bottom)); border-top:1px solid var(--g8); display:flex; gap:8px; justify-content:flex-end; flex-shrink:0; }
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:10px; color:var(--g4); text-transform:uppercase; letter-spacing:.8px; }
.field input {
  background:var(--black); border:1px solid var(--g7); border-radius:7px;
  color:var(--g1); font-family:var(--mono); font-size:12px; padding:9px 11px;
  outline:none; transition:border-color .12s; width:100%; -webkit-appearance:none;
}
.field input:focus { border-color:var(--teal); }
.field input::placeholder { color:var(--g5); }
.confirm-msg { color:var(--g3); font-size:12px; line-height:1.7; }

/* ── CATEGORY PICKER ── */
.cat-picker { display:flex; gap:8px; }
.cat-btn {
  flex:1; padding:8px 6px; border-radius:8px; border:1px solid var(--g6);
  background:var(--g8); color:var(--g2); cursor:pointer;
  font-family:var(--sans); font-size:12px; font-weight:500;
  text-align:center; transition:all .12s; -webkit-tap-highlight-color:transparent;
}
.cat-btn:hover { border-color:var(--g4); color:var(--white); }
.cat-btn.active-available   { border-color:var(--cat-available);   color:var(--cat-available);   background:var(--cat-available-d); }
.cat-btn.active-general     { border-color:var(--cat-general);     color:var(--cat-general);     background:var(--cat-general-d); }
.cat-btn.active-unavailable { border-color:var(--cat-unavailable); color:var(--cat-unavailable); background:var(--cat-unavailable-d); }

/* ── TOASTS ── */
#toasts { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:6px; z-index:300; pointer-events:none; }
.toast {
  background:var(--g8); border:1px solid var(--g6); border-radius:99px;
  padding:7px 14px; font-size:11px; display:flex; align-items:center; gap:7px;
  animation:ti .18s ease; box-shadow:0 4px 16px rgba(0,0,0,.5);
  white-space:nowrap; color:var(--g2);
}
.t-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.toast.ok   .t-dot { background:var(--ok); }
.toast.err  .t-dot { background:var(--danger); }
.toast.copy .t-dot { background:var(--teal); }
.toast.info .t-dot { background:var(--g4); }
@keyframes ti { from{transform:translateY(6px);opacity:0} to{transform:none;opacity:1} }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand">
      <div class="brand-icon">
        <img src="https://ssl.gstatic.com/docs/spreadsheets/favicon3.ico" width="16" height="16" alt="" style="border-radius:2px;display:block;" />
      </div>
      <div class="brand-name">Klivvr Scripts</div>
    </div>
    <div class="vr"></div>
    <span id="sheet-label">—</span>
    <div class="spacer"></div>
    <div id="conn-dot"></div>
    <button class="btn sm primary" id="btn-auth" onclick="doOAuthRedirect()" style="display:none">Sign in</button>
    <button class="btn sm ghost"   id="btn-out"  onclick="signOut()"         style="display:none">Sign out</button>
  </div>

  <div id="error-screen">
    <h2>Not configured</h2>
  </div>

  <div id="main-view">
    <div id="toolbar">
      <div id="search-wrap">
        <span class="s-ico">⌕</span>
        <input type="text" id="search" placeholder="Search…" oninput="filterAndRender()" autocomplete="off" spellcheck="false" />
      </div>
      <button class="btn sm" onclick="loadData()">↻</button>
      <button class="btn sm primary" onclick="openAdd()">+ Add</button>
      <div id="row-count"></div>
    </div>
    <div id="scroll-area">
      <div id="groups-container"></div>
      <div id="empty-state">No rows found</div>
    </div>
  </div>
</div>


<div id="loader"><div class="spinner"></div><p id="loader-msg">Loading…</p></div>

<!-- EDIT / ADD MODAL -->
<div id="edit-overlay" class="overlay">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <h2 id="modal-title">Row</h2>
      <button class="btn ghost icon" onclick="close_('edit-overlay')">✕</button>
    </div>
    <div class="modal-body" id="modal-fields"></div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="close_('edit-overlay')">Cancel</button>
      <button class="btn primary" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="del-overlay" class="overlay">
  <div class="modal sm">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <h2>Delete row</h2>
      <button class="btn ghost icon" onclick="close_('del-overlay')">✕</button>
    </div>
    <div class="modal-body">
      <p class="confirm-msg">This row will be permanently removed from the spreadsheet.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="close_('del-overlay')">Cancel</button>
      <button class="btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
/* ── CREDENTIALS (injected by GitHub Actions) ── */
const CLIENT_ID  = '%%GOOGLE_CLIENT_ID%%';
const SHEET_ID   = '%%GOOGLE_SHEET_ID%%';
const TARGET_GID = 1723849469;
const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const DISCOVERY  = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
const MAX_COLS   = 4; // only show first 4 columns

/* ── CATEGORY DEFINITIONS ── */
const CAT = {
  Available:   { label: 'Available',   color: '#b39ddb', rgb: [147, 112, 219] }, // medium purple
  General:     { label: 'General',     color: '#7ecece', rgb: [100, 181, 246] }, // light blue
  Unavailable: { label: 'Unavailable', color: '#ef9a9a', rgb: [229, 115, 115] }, // red
};

/* ── STORAGE KEYS ── */
const KEY_TOKEN   = 'ks_token';
const KEY_EXPIRY  = 'ks_expiry';
const KEY_AUTHED  = 'ks_authed';

/* ── STATE ── */
let S = {
  headers:    [],
  rows:       [],
  sheetName:  '',
  sortCol:    -1,
  sortAsc:    true,
  editRow:    null,
  delRow:     null,
  editCat:    'General',
};

/* ═══════════════════════════════════════════════════════════
   AUTH — redirect-based implicit flow (no popup needed)
   ═══════════════════════════════════════════════════════════ */
function getRedirectUri() {
  return window.location.origin + window.location.pathname;
}

function doOAuthRedirect() {
  const url = new URL('https://accounts.google.com/o/oauth2/v2/auth');
  url.searchParams.set('client_id',             CLIENT_ID);
  url.searchParams.set('redirect_uri',          getRedirectUri());
  url.searchParams.set('response_type',         'token');
  url.searchParams.set('scope',                 SCOPES);
  url.searchParams.set('include_granted_scopes','true');
  url.searchParams.set('prompt',                'none'); // silent if already consented
  window.location.href = url.toString();
}

function doOAuthRedirectForce() {
  const url = new URL('https://accounts.google.com/o/oauth2/v2/auth');
  url.searchParams.set('client_id',             CLIENT_ID);
  url.searchParams.set('redirect_uri',          getRedirectUri());
  url.searchParams.set('response_type',         'token');
  url.searchParams.set('scope',                 SCOPES);
  url.searchParams.set('include_granted_scopes','true');
  window.location.href = url.toString();
}

function signOut() {
  localStorage.removeItem(KEY_TOKEN);
  localStorage.removeItem(KEY_EXPIRY);
  localStorage.removeItem(KEY_AUTHED);
  // Revoke via fetch (best-effort, no blocking)
  const token = localStorage.getItem(KEY_TOKEN);
  if (token) fetch(`https://oauth2.googleapis.com/revoke?token=${token}`, { method: 'POST' }).catch(()=>{});
  document.getElementById('btn-auth').style.display = 'inline-flex';
  document.getElementById('btn-out').style.display  = 'none';
  document.getElementById('sheet-label').textContent = '—';
  document.getElementById('conn-dot').className = '';
  document.getElementById('groups-container').innerHTML = '';
  document.getElementById('row-count').textContent = '';
}

function handleTokenFromHash() {
  const hash   = new URLSearchParams(window.location.hash.slice(1));
  const token  = hash.get('access_token');
  const expIn  = hash.get('expires_in');
  const error  = hash.get('error');

  // Always clean the URL hash
  if (window.location.hash) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }

  if (error) {
    if (error === 'access_denied' || error === 'interaction_required') {
      // Silent auth failed — need user to click
      localStorage.removeItem(KEY_AUTHED);
    }
    return false;
  }

  if (token) {
    const expiry = Date.now() + parseInt(expIn || '3600') * 1000;
    localStorage.setItem(KEY_TOKEN,  token);
    localStorage.setItem(KEY_EXPIRY, String(expiry));
    localStorage.setItem(KEY_AUTHED, '1');
    return token;
  }
  return null;
}

/* ═══════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', async () => {
  if (CLIENT_ID.startsWith('%%') || SHEET_ID.startsWith('%%')) {
    document.getElementById('error-screen').style.display = 'flex';
    return;
  }

  const mv = document.getElementById('main-view');
  mv.style.cssText = 'display:flex;flex-direction:column;flex:1;overflow:hidden;';

  // 1. Check if we just came back from OAuth redirect
  const freshToken = handleTokenFromHash();

  // 2. Determine which token to use
  const storedToken  = localStorage.getItem(KEY_TOKEN);
  const storedExpiry = parseInt(localStorage.getItem(KEY_EXPIRY) || '0');
  const hasAuthed    = localStorage.getItem(KEY_AUTHED) === '1';
  const tokenValid   = storedToken && Date.now() < storedExpiry - 30000; // 30s buffer

  if (freshToken || tokenValid) {
    // We have a good token — use it directly, no popup
    await bootWithToken(freshToken || storedToken);
  } else if (hasAuthed) {
    // User has authed before, token just expired — silently redirect to refresh
    doOAuthRedirect();
  } else {
    // First visit — show Sign In button
    hideLoader();
    document.getElementById('btn-auth').style.display = 'inline-flex';
  }
});

async function bootWithToken(token) {
  showLoader('Loading…');
  try {
    // Load gapi client
    await new Promise((res, rej) => {
      loadScript('https://apis.google.com/js/api.js', () => {
        gapi.load('client', async () => {
          try {
            await gapi.client.init({});
            await gapi.client.load(DISCOVERY);
            res();
          } catch(e) { rej(e); }
        });
      });
    });

    gapi.client.setToken({ access_token: token });

    document.getElementById('btn-auth').style.display = 'none';
    document.getElementById('btn-out').style.display  = 'inline-flex';
    document.getElementById('conn-dot').className = 'ok';

    await loadData();
  } catch(e) {
    console.error(e);
    hideLoader();
    toast('Failed to connect: ' + (e.message || e), 'err');
    // If auth error, force fresh login
    if (e.status === 401) {
      localStorage.removeItem(KEY_TOKEN);
      doOAuthRedirectForce();
    }
  }
}

function loadScript(src, cb) {
  const s = document.createElement('script');
  s.src = src; s.onload = cb;
  s.onerror = () => { hideLoader(); toast('Failed to load Google APIs', 'err'); };
  document.head.appendChild(s);
}

/* ═══════════════════════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════════════════════ */
async function loadData() {
  showLoader('Loading…');
  try {
    // Use includeGridData to read cell background colors
    const meta = await gapi.client.sheets.spreadsheets.get({
      spreadsheetId: SHEET_ID,
      includeGridData: true,
      ranges: [`'${await getSheetName()}'!A:D`], // only first 4 columns
    });

    const sheetObj = meta.result.sheets.find(s => s.properties.sheetId === TARGET_GID)
                  || meta.result.sheets[0];
    S.sheetName = sheetObj.properties.title;
    document.getElementById('sheet-label').textContent =
      `${meta.result.properties.title} / ${S.sheetName}`;

    const allRows = sheetObj.data?.[0]?.rowData || [];
    if (!allRows.length) { S.headers = []; S.rows = []; filterAndRender(); hideLoader(); return; }

    // Row 0 = headers
    S.headers = (allRows[0].values || []).slice(0, MAX_COLS).map(c => c.formattedValue || '');

    // Data rows
    S.rows = [];
    for (let ri = 1; ri < allRows.length; ri++) {
      const rd     = allRows[ri];
      if (!rd) continue;
      const cells  = rd.values || [];
      const values = S.headers.map((_, ci) => cells[ci]?.formattedValue || '');
      // Skip completely empty rows
      if (values.every(v => !v.trim())) continue;
      const hex    = extractBgHex(cells[0]);
      const cat    = detectCategory(hex);
      S.rows.push({ values, hex, cat, sheetRow: ri + 1 }); // sheetRow = 1-based
    }

    filterAndRender();
    toast(`${S.rows.length} rows`, 'ok');
  } catch(e) {
    console.error(e);
    toast('Error: ' + (e.result?.error?.message || e.message || e), 'err');
    if (e.status === 401) { localStorage.removeItem(KEY_TOKEN); doOAuthRedirectForce(); }
  } finally { hideLoader(); }
}

// Helper — get sheet name from TARGET_GID without fetching grid data
async function getSheetName() {
  if (S.sheetName) return S.sheetName;
  const m = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SHEET_ID });
  const sh = m.result.sheets.find(s => s.properties.sheetId === TARGET_GID) || m.result.sheets[0];
  return sh.properties.title;
}

/* ── COLOR DETECTION ── */
function extractBgHex(cell) {
  const bg = cell?.effectiveFormat?.backgroundColor || cell?.userEnteredFormat?.backgroundColor;
  if (!bg) return null;
  const r = Math.round((bg.red   || 0) * 255);
  const g = Math.round((bg.green || 0) * 255);
  const b = Math.round((bg.blue  || 0) * 255);
  if (r > 245 && g > 245 && b > 245) return null; // white = no fill
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function hexToHsl(hex) {
  if (!hex) return [0, 0, 100];
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h=0, s=0, l=(max+min)/2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0))/6; break;
      case g: h = ((b-r)/d + 2)/6; break;
      case b: h = ((r-g)/d + 4)/6; break;
    }
  }
  return [h*360, s*100, l*100];
}

function detectCategory(hex) {
  if (!hex) return 'General';
  const [h, s] = hexToHsl(hex);
  if (s < 12) return 'General';           // gray/unsaturated
  if (h < 30 || h >= 330) return 'Unavailable'; // reds
  if (h >= 200 && h < 285) return 'General';    // blues / cyans
  if (h >= 285 && h < 330) return 'Available';  // purples
  if (h >= 30  && h < 200) return 'General';    // yellows/greens → general
  return 'General';
}

/* ═══════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════ */
function filterAndRender() {
  const q = document.getElementById('search').value.toLowerCase();
  let rows = q
    ? S.rows.filter(r => r.values.some(v => v.toLowerCase().includes(q)))
    : S.rows;

  document.getElementById('row-count').textContent = rows.length ? `${rows.length}/${S.rows.length}` : '';
  document.getElementById('empty-state').style.display = rows.length ? 'none' : 'flex';

  // Group by category, preserve order: Available, General, Unavailable
  const ORDER = ['Available', 'General', 'Unavailable'];
  const grouped = {};
  ORDER.forEach(k => grouped[k] = []);
  rows.forEach(r => { if (grouped[r.cat]) grouped[r.cat].push(r); });

  const container = document.getElementById('groups-container');
  container.innerHTML = '';

  ORDER.forEach(catKey => {
    const catRows = grouped[catKey];
    if (!catRows.length) return;

    const def = CAT[catKey];
    const groupEl = document.createElement('div');
    groupEl.className = 'group'; // collapsed by default
    groupEl.dataset.key = catKey;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `
      <div class="g-swatch" style="background:${def.color}"></div>
      <div class="g-name">${xe(def.label)}</div>
      <div class="g-count">${catRows.length}</div>
      <div class="g-chev">›</div>`;
    hdr.addEventListener('click', () => groupEl.classList.toggle('open'));
    groupEl.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'group-body';

    // Desktop table
    const tbl = document.createElement('table');
    let thead = '<thead><tr><th>#</th>';
    S.headers.forEach((h, i) => {
      const on = S.sortCol === i;
      thead += `<th data-col="${i}" class="${on?'sorted':''}">${xe(h)}<span class="sa${on?' on':''}">${on?(S.sortAsc?'↑':'↓'):'↕'}</span></th>`;
    });
    thead += '<th></th></tr></thead>';
    tbl.innerHTML = thead;
    tbl.querySelectorAll('th[data-col]').forEach(th =>
      th.addEventListener('click', () => sortBy(parseInt(th.dataset.col)))
    );

    const tbody = document.createElement('tbody');
    catRows.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="rn">${row.sheetRow}</td>`;
      S.headers.forEach((_, ci) => {
        const val = row.values[ci] || '';
        const td  = document.createElement('td');
        if (ci === 0) {
          const dot = document.createElement('span');
          dot.className = 'cat-dot';
          dot.style.background = row.hex || def.color;
          td.appendChild(dot);
          td.appendChild(document.createTextNode(val));
        } else {
          td.textContent = val;
        }
        td.title = val;
        td.addEventListener('click', () => copyCell(td, val));
        tr.appendChild(td);
      });
      const act = document.createElement('td');
      act.className = 'act';
      act.innerHTML = `<button class="btn sm ghost icon" title="Edit">✎</button> <button class="btn sm danger icon" title="Delete">✕</button>`;
      act.querySelector('[title="Edit"]').addEventListener('click',   () => openEdit(row));
      act.querySelector('[title="Delete"]').addEventListener('click', () => openDel(row));
      tr.appendChild(act);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    body.appendChild(tbl);

    // Mobile cards
    const cards = document.createElement('div');
    cards.className = 'mob-cards';
    catRows.forEach(row => {
      const card = document.createElement('div');
      card.className = 'row-card';
      const title = row.values[0] || '—';
      let fields = '';
      S.headers.forEach((h, i) => {
        if (i === 0) return;
        const val = row.values[i] || '';
        fields += `<div><div class="cf-label">${xe(h)}</div><div class="cf-val${val?'':' empty'}">${val ? xe(val) : '—'}</div></div>`;
      });
      card.innerHTML = `
        <div class="card-top">
          <div class="card-name">${xe(title)}</div>
          <div class="card-acts">
            <button class="btn sm ghost icon">✎</button>
            <button class="btn sm danger icon">✕</button>
          </div>
        </div>
        <div class="card-fields">${fields}</div>`;
      card.querySelector('.card-name').addEventListener('click', () => copyCell(card.querySelector('.card-name'), title));
      card.querySelectorAll('.cf-val:not(.empty)').forEach((el, i) => {
        const val = row.values[i + 1] || '';
        el.addEventListener('click', () => copyCell(el, val));
      });
      card.querySelectorAll('.card-acts .btn')[0].addEventListener('click', () => openEdit(row));
      card.querySelectorAll('.card-acts .btn')[1].addEventListener('click', () => openDel(row));
      cards.appendChild(card);
    });
    body.appendChild(cards);

    groupEl.appendChild(body);
    container.appendChild(groupEl);
  });
}

/* ── SORT ── */
function sortBy(col) {
  S.sortAsc = S.sortCol === col ? !S.sortAsc : true;
  S.sortCol = col;
  S.rows.sort((a, b) => {
    const av = (a.values[col]||'').toLowerCase();
    const bv = (b.values[col]||'').toLowerCase();
    const n  = parseFloat(av) - parseFloat(bv);
    return (S.sortAsc?1:-1) * (isNaN(n) ? av.localeCompare(bv) : n);
  });
  filterAndRender();
}

/* ── COPY ── */
function copyCell(el, val) {
  if (!val) return;
  navigator.clipboard.writeText(val).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 700);
    const preview = val.replace(/\n/g,' ');
    toast('Copied — ' + (preview.length > 30 ? preview.slice(0,30)+'…' : preview), 'copy');
  }).catch(() => toast('Copy failed', 'err'));
}

/* ═══════════════════════════════════════════════════════════
   ADD / EDIT
   ═══════════════════════════════════════════════════════════ */
function buildCatPicker(selectedCat) {
  S.editCat = selectedCat;
  return `
    <div class="field">
      <label>Category</label>
      <div class="cat-picker" id="cat-picker">
        ${Object.entries(CAT).map(([k, v]) =>
          `<button type="button" class="cat-btn${selectedCat===k?' active-'+k.toLowerCase():''}" data-cat="${k}"
            style="border-color:${selectedCat===k?v.color:''}; color:${selectedCat===k?v.color:''}">
            ${v.label}
          </button>`
        ).join('')}
      </div>
    </div>`;
}

function attachCatPicker() {
  document.querySelectorAll('#cat-picker .cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.editCat = btn.dataset.cat;
      // Re-render picker
      const picker = document.getElementById('cat-picker');
      picker.querySelectorAll('.cat-btn').forEach(b => {
        const k   = b.dataset.cat;
        const def = CAT[k];
        const on  = k === S.editCat;
        b.className = `cat-btn${on ? ' active-' + k.toLowerCase() : ''}`;
        b.style.borderColor = on ? def.color : '';
        b.style.color       = on ? def.color : '';
      });
    });
  });
}

function openAdd() {
  S.editRow = null;
  S.editCat = 'General';
  document.getElementById('modal-title').textContent = 'Add row';
  document.getElementById('modal-fields').innerHTML =
    buildCatPicker('General') +
    S.headers.map((h, i) => `
      <div class="field">
        <label>${xe(h)}</label>
        <input type="text" id="f${i}" value="" placeholder="—" autocomplete="off" />
      </div>`).join('');
  attachCatPicker();
  open_('edit-overlay');
  setTimeout(() => document.getElementById('f0')?.focus(), 100);
}

function openEdit(row) {
  S.editRow = row;
  S.editCat = row.cat;
  document.getElementById('modal-title').textContent = 'Edit row';
  document.getElementById('modal-fields').innerHTML =
    buildCatPicker(row.cat) +
    S.headers.map((h, i) => `
      <div class="field">
        <label>${xe(h)}</label>
        <input type="text" id="f${i}" value="${xe(row.values[i]||'')}" placeholder="—" autocomplete="off" />
      </div>`).join('');
  attachCatPicker();
  open_('edit-overlay');
  setTimeout(() => document.getElementById('f0')?.focus(), 100);
}

async function saveRow() {
  const vals = S.headers.map((_, i) => document.getElementById('f'+i)?.value || '');
  const cat  = S.editCat;
  const rgb  = CAT[cat]?.rgb || CAT.General.rgb;
  close_('edit-overlay');
  showLoader('Saving…');
  try {
    if (!S.editRow) {
      // Append row
      await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: SHEET_ID, range: S.sheetName,
        valueInputOption: 'USER_ENTERED', insertDataOption: 'INSERT_ROWS',
        resource: { values: [vals] },
      });
      // We need to know the new row's index to color it — get it by reloading
      // First, set color on the last row after reload
      await loadData();
      // Find the newly added row (last matching values)
      const added = [...S.rows].reverse().find(r =>
        r.values[0] === vals[0] && r.values[1] === vals[1]
      );
      if (added) await setCellColor(added.sheetRow, rgb);
      toast('Row added', 'ok');
    } else {
      // Update values
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SHEET_ID,
        range: `${S.sheetName}!A${S.editRow.sheetRow}`,
        valueInputOption: 'USER_ENTERED',
        resource: { values: [vals] },
      });
      // Update color if category changed
      if (cat !== S.editRow.cat) {
        await setCellColor(S.editRow.sheetRow, rgb);
      }
      toast('Row updated', 'ok');
    }
    await loadData();
  } catch(e) { toast('Save failed: ' + (e.result?.error?.message || e.message || e), 'err'); }
  finally { hideLoader(); }
}

/* ── SET CELL BACKGROUND COLOR ── */
async function setCellColor(sheetRow, rgb) {
  // sheetRow is 1-based (row 1 = header, row 2 = first data row)
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: SHEET_ID,
    resource: {
      requests: [{
        repeatCell: {
          range: {
            sheetId:         TARGET_GID,
            startRowIndex:   sheetRow - 1, // 0-based
            endRowIndex:     sheetRow,
            startColumnIndex: 0,
            endColumnIndex:   1,
          },
          cell: {
            userEnteredFormat: {
              backgroundColor: {
                red:   rgb[0] / 255,
                green: rgb[1] / 255,
                blue:  rgb[2] / 255,
              }
            }
          },
          fields: 'userEnteredFormat.backgroundColor'
        }
      }]
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   DELETE
   ═══════════════════════════════════════════════════════════ */
function openDel(row) { S.delRow = row; open_('del-overlay'); }

async function confirmDelete() {
  const row = S.delRow;
  close_('del-overlay'); showLoader('Deleting…');
  try {
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId: SHEET_ID,
      resource: { requests: [{ deleteDimension: {
        range: {
          sheetId:    TARGET_GID,
          dimension:  'ROWS',
          startIndex: row.sheetRow - 1, // 0-based
          endIndex:   row.sheetRow,
        }
      }}]},
    });
    toast('Row deleted', 'ok');
    await loadData();
  } catch(e) { toast('Delete failed: ' + (e.result?.error?.message || e.message || e), 'err'); }
  finally { hideLoader(); }
}

/* ── UI HELPERS ── */
const open_      = id => document.getElementById(id).classList.add('open');
const close_     = id => document.getElementById(id).classList.remove('open');
const showLoader = msg => { document.getElementById('loader-msg').textContent = msg; document.getElementById('loader').style.display = 'flex'; };
const hideLoader = ()  => document.getElementById('loader').style.display = 'none';

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="t-dot"></div><span>${xe(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function xe(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { close_('edit-overlay'); close_('del-overlay'); }
});
document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);
</script>
