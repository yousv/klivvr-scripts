<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Klivvr Scripts</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect width='24' height='24' rx='5' fill='%23111'/><path d='M3 3h18v3H3V3zm0 5h12v3H3V8zm0 5h18v3H3v-3zm0 5h12v3H3v-3z' fill='%237ecece'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black:  #080808;
  --g9:     #111111;
  --g8:     #1a1a1a;
  --g7:     #242424;
  --g6:     #2e2e2e;
  --g5:     #3d3d3d;
  --g4:     #5a5a5a;
  --g3:     #888888;
  --g2:     #b8b8b8;
  --g1:     #e0e0e0;
  --white:  #f5f5f5;
  --teal:   #7ecece;
  --teal-d: rgba(126,206,206,.1);
  --danger: #cc5555;
  --ok:     #5aaa7a;
  --mono:   'DM Mono', monospace;
  --sans:   'Outfit', sans-serif;

  /* category accent colors */
  --cat-available:   #b39ddb;
  --cat-general:     #7ecece;
  --cat-unavailable: #ef9a9a;
  --cat-other:       #888888;
  --cat-available-d:   rgba(179,157,219,.1);
  --cat-general-d:     rgba(126,206,206,.1);
  --cat-unavailable-d: rgba(239,154,154,.1);
  --cat-other-d:       rgba(136,136,136,.07);
}
html, body { height: 100%; font-family: var(--mono); font-size: 14px; color: var(--g1); background: var(--black); -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--g6); border-radius: 99px; }
#app { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }

/* ── TOPBAR ── */
#topbar {
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px; height: 58px; flex-shrink: 0;
  background: var(--g9); border-bottom: 1px solid var(--g7);
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--g5); display: flex; align-items: center; justify-content: center; }
.brand-icon svg { width: 15px; height: 15px; fill: var(--teal); }
.brand-name { font-family: var(--sans); font-size: 15px; font-weight: 600; color: var(--white); letter-spacing: -0.2px; }
.vr { width: 1px; height: 20px; background: var(--g7); flex-shrink: 0; }
#sheet-label { font-size: 12px; color: var(--g3); max-width: 220px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.spacer { flex: 1; }
#conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--g5); transition: background .3s, box-shadow .3s; flex-shrink: 0; }
#conn-dot.ok  { background: var(--teal); box-shadow: 0 0 7px var(--teal); }
#conn-dot.err { background: var(--danger); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  border: 1px solid var(--g6); border-radius: 8px;
  padding: 7px 16px; font-family: var(--mono); font-size: 12px;
  background: var(--g8); color: var(--g2); cursor: pointer;
  transition: border-color .12s, color .12s, background .12s;
  white-space: nowrap; -webkit-tap-highlight-color: transparent;
}
.btn:hover { border-color: var(--g4); color: var(--white); background: var(--g7); }
.btn.primary { background: var(--teal); border-color: var(--teal); color: var(--black); font-weight: 500; }
.btn.primary:hover { background: #9cdede; border-color: #9cdede; }
.btn.danger { background: transparent; border-color: var(--g6); color: var(--danger); }
.btn.danger:hover { border-color: var(--danger); background: rgba(204,85,85,.07); }
.btn.ghost { background: transparent; border-color: transparent; color: var(--g3); }
.btn.ghost:hover { background: var(--g8); border-color: var(--g6); color: var(--g1); }
.btn.sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }
.btn.icon { width: 30px; height: 30px; padding: 0; border-radius: 6px; }
.btn:disabled { opacity: .3; cursor: not-allowed; pointer-events: none; }

/* ── ERROR ── */
#error-screen { flex:1; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:40px; text-align:center; }
#error-screen h2 { font-family:var(--sans); font-size:16px; font-weight:600; color:var(--danger); }
#error-screen p  { color:var(--g3); font-size:12px; line-height:1.8; max-width:400px; }
#error-screen code { color:var(--teal); background:var(--g8); padding:1px 6px; border-radius:4px; }

/* ── MAIN ── */
#main-view { display:none; flex-direction:column; flex:1; overflow:hidden; }

/* ── TOOLBAR ── */
#toolbar {
  display:flex; align-items:center; gap:10px;
  padding:10px 20px; flex-shrink:0;
  background:var(--g9); border-bottom:1px solid var(--g7);
}
#search-wrap { position:relative; flex:1; max-width:280px; }
#search-wrap input {
  width:100%; background:var(--black); border:1px solid var(--g7);
  border-radius:7px; color:var(--g1); font-family:var(--mono); font-size:13px;
  padding:7px 12px 7px 32px; outline:none; transition:border-color .12s;
}
#search-wrap input:focus { border-color:var(--teal); }
#search-wrap input::placeholder { color:var(--g5); }
.s-ico { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--g4); pointer-events:none; font-size:15px; }
#row-count { font-size:12px; color:var(--g4); margin-left:auto; white-space:nowrap; }

/* ── SCROLL AREA ── */
#scroll-area { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

/* ── GROUPS ── */
.group { border-bottom:1px solid var(--g7); }
.group-header {
  display:flex; align-items:center; gap:12px;
  padding:13px 20px; cursor:pointer;
  background:var(--g9); position:sticky; top:0; z-index:5;
  border-bottom:1px solid var(--g7);
  user-select:none; -webkit-tap-highlight-color:transparent;
  transition:background .1s;
}
.group-header:hover { background:var(--g8); }
.g-swatch { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
.g-name { font-family:var(--sans); font-size:14px; font-weight:600; color:var(--white); flex:1; }
.g-count { font-size:12px; color:var(--g4); }
.g-chev { font-size:12px; color:var(--g4); transition:transform .2s; flex-shrink:0; }
.group.open .g-chev { transform:rotate(90deg); }
.group-body { display:none; }
.group.open .group-body { display:block; }

/* ── CARDS (all screen sizes) ── */
.cards-list { display:flex; flex-direction:column; }

.row-card {
  border-bottom:1px solid var(--g8);
  padding:14px 20px; display:flex; flex-direction:column; gap:10px;
  transition:background .08s;
}
.row-card:hover { background:var(--g8); }

/* Name row — full width, prominent */
.card-name-row {
  display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
}
.card-name {
  font-family:var(--sans); font-size:15px; font-weight:600; color:var(--white);
  white-space:pre-wrap; word-break:break-word; flex:1; line-height:1.4;
  /* not copyable — cursor default */
}
.cat-dot-inline {
  display:inline-block; width:8px; height:8px; border-radius:50%;
  margin-right:8px; vertical-align:middle; position:relative; top:-1px; flex-shrink:0;
}
.card-acts { display:flex; gap:5px; flex-shrink:0; padding-top:2px; }

/* Three cols below name */
.card-fields { display:grid; grid-template-columns:repeat(3,1fr); gap:10px 16px; }
@media (max-width:479px) { .card-fields { grid-template-columns:1fr 1fr; } }

.cf-block { display:flex; flex-direction:column; gap:3px; }
.cf-label { font-size:10px; color:var(--g4); text-transform:uppercase; letter-spacing:.8px; }
.cf-val {
  font-size:13px; color:var(--g2); white-space:pre-wrap; word-break:break-word;
  cursor:pointer; transition:color .1s;
}
.cf-val:hover { color:var(--white); }
.cf-val.empty { color:var(--g5); font-style:italic; }
.cf-val.copied { color:var(--teal) !important; }

/* hide old table styles */
table { display:none !important; }

#empty-state { display:none; flex-direction:column; align-items:center; justify-content:center; padding:80px 32px; gap:8px; color:var(--g5); font-size:14px; }

/* ── MOBILE ADJUSTMENTS ── */
@media (max-width:639px) {
  #topbar { padding:0 14px; height:52px; }
  #sheet-label { display:none; }
  .vr { display:none; }
  #toolbar { padding:8px 14px; gap:8px; }
  #search-wrap { max-width:none; }
  .row-card { padding:12px 14px; }
}

#fab { display:none !important; }

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; background:rgba(8,8,8,.88); backdrop-filter:blur(6px);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:200;
}
.spinner { width:26px; height:26px; border:1.5px solid var(--g7); border-top-color:var(--teal); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#loader p { color:var(--g4); font-size:12px; }

/* ── MODALS ── */
.overlay {
  position:fixed; inset:0; background:rgba(8,8,8,.82); backdrop-filter:blur(4px);
  display:none; align-items:flex-end; justify-content:center; z-index:100;
}
.overlay.open { display:flex; animation:fi .13s ease; }
@keyframes fi { from{opacity:0} to{opacity:1} }
.modal {
  background:var(--g9); border:1px solid var(--g7);
  border-radius:14px 14px 0 0; width:100%; max-height:92dvh;
  overflow-y:auto; display:flex; flex-direction:column;
  animation:su .2s cubic-bezier(.22,1,.36,1);
}
@keyframes su { from{transform:translateY(100%)} to{transform:none} }
@media (min-width:640px) {
  .overlay { align-items:center; padding:20px; }
  .modal { border-radius:12px; max-width:480px; animation:pi .16s ease; }
  .modal.sm { max-width:360px; }
  @keyframes pi { from{transform:scale(.97);opacity:0} to{transform:none;opacity:1} }
}
.drag-handle { width:32px; height:3px; border-radius:99px; background:var(--g7); margin:10px auto 2px; flex-shrink:0; }
@media (min-width:640px) { .drag-handle { display:none; } }
.modal-head { padding:16px 20px 14px; border-bottom:1px solid var(--g8); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.modal-head h2 { font-family:var(--sans); font-size:14px; font-weight:600; color:var(--white); flex:1; }
.modal-body { padding:16px 20px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.modal-foot { padding:14px 20px; padding-bottom:max(14px, env(safe-area-inset-bottom)); border-top:1px solid var(--g8); display:flex; gap:8px; justify-content:flex-end; flex-shrink:0; }
.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:11px; color:var(--g4); text-transform:uppercase; letter-spacing:.8px; }
.field input, .field textarea {
  background:var(--black); border:1px solid var(--g7); border-radius:7px;
  color:var(--g1); font-family:var(--mono); font-size:13px; padding:10px 12px;
  outline:none; transition:border-color .12s; width:100%; -webkit-appearance:none;
  resize:vertical;
}
.field input:focus, .field textarea:focus { border-color:var(--teal); }
.field input::placeholder, .field textarea::placeholder { color:var(--g5); }
.field textarea { min-height:72px; white-space:pre-wrap; }
.confirm-msg { color:var(--g3); font-size:13px; line-height:1.7; }

/* ── CATEGORY PICKER ── */
.cat-picker { display:flex; gap:8px; }
.cat-btn {
  flex:1; padding:8px 6px; border-radius:8px; border:1px solid var(--g6);
  background:var(--g8); color:var(--g2); cursor:pointer;
  font-family:var(--sans); font-size:12px; font-weight:500;
  text-align:center; transition:all .12s; -webkit-tap-highlight-color:transparent;
}
.cat-btn:hover { border-color:var(--g4); color:var(--white); }
.cat-btn.active-available   { border-color:var(--cat-available);   color:var(--cat-available);   background:var(--cat-available-d); }
.cat-btn.active-general     { border-color:var(--cat-general);     color:var(--cat-general);     background:var(--cat-general-d); }
.cat-btn.active-unavailable { border-color:var(--cat-unavailable); color:var(--cat-unavailable); background:var(--cat-unavailable-d); }
.cat-btn.active-other       { border-color:var(--cat-other);       color:var(--cat-other);       background:var(--cat-other-d); }

/* ── TOASTS ── */
#toasts { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:6px; z-index:300; pointer-events:none; }
.toast {
  background:var(--g8); border:1px solid var(--g6); border-radius:99px;
  padding:7px 14px; font-size:11px; display:flex; align-items:center; gap:7px;
  animation:ti .18s ease; box-shadow:0 4px 16px rgba(0,0,0,.5);
  white-space:nowrap; color:var(--g2);
}
.t-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.toast.ok   .t-dot { background:var(--ok); }
.toast.err  .t-dot { background:var(--danger); }
.toast.copy .t-dot { background:var(--teal); }
.toast.info .t-dot { background:var(--g4); }
@keyframes ti { from{transform:translateY(6px);opacity:0} to{transform:none;opacity:1} }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M3 3h18v3H3V3zm0 5h12v3H3V8zm0 5h18v3H3v-3zm0 5h12v3H3v-3z"/></svg>
      </div>
      <div class="brand-name">Klivvr Scripts</div>
    </div>
    <div class="vr"></div>
    <span id="sheet-label">—</span>
    <div class="spacer"></div>
    <div id="conn-dot"></div>
    <button class="btn sm primary" id="btn-auth" onclick="handleAuth()" style="display:none">Sign in</button>
    <button class="btn sm ghost"   id="btn-out"  onclick="signOut()"         style="display:none">Sign out</button>
  </div>

  <div id="error-screen">
    <h2>Not configured</h2>
  </div>

  <div id="main-view">
    <div id="toolbar">
      <div id="search-wrap">
        <span class="s-ico">⌕</span>
        <input type="text" id="search" placeholder="Search…" oninput="filterAndRender()" autocomplete="off" spellcheck="false" />
      </div>
      <button class="btn sm" onclick="loadData()">↻</button>
      <button class="btn sm primary" onclick="openAdd()">+ Add</button>
      <div id="row-count"></div>
    </div>
    <div id="scroll-area">
      <div id="groups-container"></div>
      <div id="empty-state">No rows found</div>
    </div>
  </div>
</div>


<div id="loader"><div class="spinner"></div><p id="loader-msg">Loading…</p></div>

<!-- EDIT / ADD MODAL -->
<div id="edit-overlay" class="overlay">
  <div class="modal">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <h2 id="modal-title">Row</h2>
      <button class="btn ghost icon" onclick="close_('edit-overlay')">✕</button>
    </div>
    <div class="modal-body" id="modal-fields"></div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="close_('edit-overlay')">Cancel</button>
      <button class="btn primary" onclick="saveRow()">Save</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div id="del-overlay" class="overlay">
  <div class="modal sm">
    <div class="drag-handle"></div>
    <div class="modal-head">
      <h2>Delete row</h2>
      <button class="btn ghost icon" onclick="close_('del-overlay')">✕</button>
    </div>
    <div class="modal-body">
      <p class="confirm-msg">This row will be permanently removed from the spreadsheet.</p>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" onclick="close_('del-overlay')">Cancel</button>
      <button class="btn danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
/* ── CREDENTIALS (injected by GitHub Actions) ── */
const CLIENT_ID  = '%%GOOGLE_CLIENT_ID%%';
const SHEET_ID   = '%%GOOGLE_SHEET_ID%%';
const TARGET_GID = 1723849469;
const SCOPES     = 'https://www.googleapis.com/auth/spreadsheets';
const DISCOVERY  = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
const MAX_COLS   = 4; // only show first 4 columns

/* ── CATEGORY DEFINITIONS ── */
const CAT = {
  Available:   { label: 'Available',   color: '#b39ddb', rgb: [147, 112, 219] },
  General:     { label: 'General',     color: '#7ecece', rgb: [100, 181, 246] },
  Unavailable: { label: 'Unavailable', color: '#ef9a9a', rgb: [229, 115, 115] },
  Other:       { label: 'Other',       color: '#888888', rgb: [120, 120, 120] },
};
const CAT_ORDER = ['Available', 'General', 'Unavailable', 'Other'];

/* ── STORAGE KEYS ── */
const KEY_TOKEN  = 'ks_token';
const KEY_EXPIRY = 'ks_expiry';

/* ── STATE ── */
let S = {
  headers:     [],
  rows:        [],
  sheetName:   '',
  editRow:     null,
  delRow:      null,
  editCat:     'General',
  openGroups:  new Set(), // persists across re-renders
  tokenClient: null,
  gapiReady:   false,
  gisReady:    false,
};

/* ═══════════════════════════════════════════════════════════
   AUTH — GIS popup flow + localStorage token persistence
   Uses Authorized JavaScript origins (no redirect URIs needed)
   ═══════════════════════════════════════════════════════════ */

function saveToken(token, expiresIn) {
  localStorage.setItem(KEY_TOKEN,  token);
  localStorage.setItem(KEY_EXPIRY, String(Date.now() + expiresIn * 1000));
}

function loadToken() {
  const token  = localStorage.getItem(KEY_TOKEN);
  const expiry = parseInt(localStorage.getItem(KEY_EXPIRY) || '0');
  if (token && Date.now() < expiry - 30000) return token; // valid with 30s buffer
  return null;
}

function clearToken() {
  localStorage.removeItem(KEY_TOKEN);
  localStorage.removeItem(KEY_EXPIRY);
}

function signOut() {
  const t = gapi?.client?.getToken?.();
  if (t?.access_token) {
    google.accounts.oauth2.revoke(t.access_token, () => {});
    gapi.client.setToken(null);
  }
  clearToken();
  document.getElementById('btn-auth').style.display = 'inline-flex';
  document.getElementById('btn-out').style.display  = 'none';
  document.getElementById('sheet-label').textContent = '—';
  document.getElementById('conn-dot').className = '';
  document.getElementById('groups-container').innerHTML = '';
  document.getElementById('row-count').textContent = '';
}

/* ═══════════════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  if (CLIENT_ID.startsWith('%%') || SHEET_ID.startsWith('%%')) {
    document.getElementById('error-screen').style.display = 'flex';
    return;
  }
  const mv = document.getElementById('main-view');
  mv.style.cssText = 'display:flex;flex-direction:column;flex:1;overflow:hidden;';
  showLoader('Connecting…');
  loadScript('https://apis.google.com/js/api.js', onGapiLoad);
  loadScript('https://accounts.google.com/gsi/client', onGisLoad);
});

function loadScript(src, cb) {
  const s = document.createElement('script');
  s.src = src; s.onload = cb;
  s.onerror = () => { hideLoader(); toast('Failed to load Google APIs', 'err'); };
  document.head.appendChild(s);
}

function onGapiLoad() {
  gapi.load('client', async () => {
    await gapi.client.init({});
    await gapi.client.load(DISCOVERY);
    S.gapiReady = true;
    checkReady();
  });
}

function onGisLoad() {
  S.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) {
        hideLoader();
        toast('Sign in failed: ' + resp.error, 'err');
        document.getElementById('btn-auth').style.display = 'inline-flex';
        return;
      }
      // Save token so we can reuse it without a popup next visit
      saveToken(resp.access_token, parseInt(resp.expires_in || '3600'));
      onAuthed();
    },
  });
  S.gisReady = true;
  checkReady();
}

function checkReady() {
  if (!S.gapiReady || !S.gisReady) return;
  hideLoader();

  const savedToken = loadToken();
  if (savedToken) {
    // Reuse stored token — no popup needed
    gapi.client.setToken({ access_token: savedToken });
    onAuthed();
  } else {
    // First visit or token expired — show Sign In button
    document.getElementById('btn-auth').style.display = 'inline-flex';
  }
}

// Called when Sign In button is clicked
function handleAuth() {
  // prompt:'' = show consent if needed, silent if already granted
  S.tokenClient.requestAccessToken({ prompt: '' });
}

function onAuthed() {
  document.getElementById('btn-auth').style.display = 'none';
  document.getElementById('btn-out').style.display  = 'inline-flex';
  document.getElementById('conn-dot').className = 'ok';
  loadData();
}

/* ═══════════════════════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════════════════════ */
async function loadData() {
  showLoader('Loading…');
  try {
    const sheetName = S.sheetName || await resolveSheetName();
    const meta = await gapi.client.sheets.spreadsheets.get({
      spreadsheetId: SHEET_ID,
      includeGridData: true,
      ranges: [`'${sheetName}'!A:D`],
      fields: 'properties.title,sheets(properties,data(rowData(values(formattedValue,effectiveFormat(backgroundColor,textFormat(foregroundColor,foregroundColorStyle))))))',
    });

    const sheetObj = meta.result.sheets.find(s => s.properties.sheetId === TARGET_GID)
                  || meta.result.sheets[0];
    S.sheetName = sheetObj.properties.title;
    document.getElementById('sheet-label').textContent =
      `${meta.result.properties.title} / ${S.sheetName}`;

    const allRows = sheetObj.data?.[0]?.rowData || [];
    if (!allRows.length) { S.headers = []; S.rows = []; filterAndRender(); return; }

    S.headers = (allRows[0].values || []).slice(0, MAX_COLS).map(c => c.formattedValue || '');

    S.rows = [];
    for (let ri = 1; ri < allRows.length; ri++) {
      const cells  = allRows[ri]?.values || [];
      const values = S.headers.map((_, ci) => cells[ci]?.formattedValue || '');
      if (values.every(v => !v.trim())) continue;
      const hex   = extractBgHex(cells[0]);
      const fgHex = extractFgHex(cells[0]);
      const cat   = detectCategory(hex);
      S.rows.push({ values, hex, fgHex, cat, sheetRow: ri + 1 });
    }

    filterAndRender();
    toast(`${S.rows.length} rows`, 'ok');
  } catch(e) {
    console.error(e);
    toast('Error: ' + (e.result?.error?.message || e.message || e), 'err');
    if (e.status === 401) {
      clearToken(); gapi.client.setToken(null);
      document.getElementById('btn-auth').style.display = 'inline-flex';
      document.getElementById('btn-out').style.display  = 'none';
      document.getElementById('conn-dot').className = 'err';
    }
  } finally { hideLoader(); }
}

async function resolveSheetName() {
  const m  = await gapi.client.sheets.spreadsheets.get({ spreadsheetId: SHEET_ID, fields: 'sheets.properties' });
  const sh = m.result.sheets.find(s => s.properties.sheetId === TARGET_GID) || m.result.sheets[0];
  return sh.properties.title;
}

/* ── COLOR HELPERS ── */
function rgbToHex(c) {
  const r = Math.round((c.red   || 0) * 255);
  const g = Math.round((c.green || 0) * 255);
  const b = Math.round((c.blue  || 0) * 255);
  return [r, g, b];
}

function extractBgHex(cell) {
  const fmt = cell?.effectiveFormat || cell?.userEnteredFormat;
  const bg  = fmt?.backgroundColor;
  if (!bg) return null;
  const [r, g, b] = rgbToHex(bg);
  if (r > 245 && g > 245 && b > 245) return null; // white = no fill
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function extractFgHex(cell) {
  const fmt = cell?.effectiveFormat || cell?.userEnteredFormat;
  // Sheets returns foregroundColorStyle.rgbColor (newer) or foregroundColor (older)
  const fg  = fmt?.textFormat?.foregroundColorStyle?.rgbColor
           || fmt?.textFormat?.foregroundColor;
  if (!fg) return null;
  const [r, g, b] = rgbToHex(fg);
  if (r < 15 && g < 15 && b < 15) return null; // near-black = default, skip
  if (r > 240 && g > 240 && b > 240) return null; // near-white, skip
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1,3),16)/255;
  let g = parseInt(hex.slice(3,5),16)/255;
  let b = parseInt(hex.slice(5,7),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max - min;
  let h = 0, s = 0, l = (max + min) / 2;
  if (d) {
    s = d / (l > 0.5 ? 2 - max - min : max + min);
    switch(max) {
      case r: h = ((g-b)/d + (g<b?6:0)) / 6; break;
      case g: h = ((b-r)/d + 2) / 6; break;
      case b: h = ((r-g)/d + 4) / 6; break;
    }
  }
  return [h*360, s*100, l*100];
}

function detectCategory(hex) {
  if (!hex) return 'General';
  const [h, s] = hexToHsl(hex);
  if (s < 10) return 'General';
  if (h < 20  || h >= 340) return 'Unavailable'; // reds
  if (h >= 250 && h < 340) return 'Available';   // purples
  if (h >= 170 && h < 250) return 'General';     // blues/cyans
  return 'Other';                                  // everything else
}

/* ═══════════════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════════════ */
function filterAndRender() {
  const q = document.getElementById('search').value.toLowerCase();
  const rows = q ? S.rows.filter(r => r.values.some(v => v.toLowerCase().includes(q))) : S.rows;

  document.getElementById('row-count').textContent = rows.length ? `${rows.length}/${S.rows.length}` : '';
  document.getElementById('empty-state').style.display = rows.length ? 'none' : 'flex';

  // Group rows
  const grouped = Object.fromEntries(CAT_ORDER.map(k => [k, []]));
  rows.forEach(r => { (grouped[r.cat] || grouped.Other).push(r); });

  const container = document.getElementById('groups-container');
  container.innerHTML = '';

  CAT_ORDER.forEach(catKey => {
    const catRows = grouped[catKey];
    if (!catRows.length) return;

    // Sort A→Z by name
    catRows.sort((a, b) => (a.values[0]||'').localeCompare(b.values[0]||'', undefined, {sensitivity:'base'}));

    const def    = CAT[catKey];
    const isOpen = S.openGroups.has(catKey);

    const groupEl = document.createElement('div');
    groupEl.className = 'group' + (isOpen ? ' open' : '');
    groupEl.dataset.key = catKey;

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'group-header';
    hdr.innerHTML = `
      <div class="g-swatch" style="background:${def.color}"></div>
      <div class="g-name">${def.label}</div>
      <div class="g-count">${catRows.length}</div>
      <div class="g-chev">›</div>`;
    hdr.addEventListener('click', () => {
      const open = groupEl.classList.toggle('open');
      open ? S.openGroups.add(catKey) : S.openGroups.delete(catKey);
    });
    groupEl.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'group-body';
    const cardList = document.createElement('div');
    cardList.className = 'cards-list';

    catRows.forEach(row => {
      const card    = document.createElement('div');
      card.className = 'row-card';

      const name    = row.values[0] || '—';
      const bgColor = row.hex   || def.color;
      const fgColor = row.fgHex || null;

      // ── Name row (not copyable — just a title)
      const nameRow = document.createElement('div');
      nameRow.className = 'card-name-row';

      const nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.dir = 'rtl';
      // Dot + text
      const dot = document.createElement('span');
      dot.className = 'cat-dot-inline';
      dot.style.background = bgColor;
      nameEl.appendChild(dot);
      nameEl.appendChild(document.createTextNode(name));
      if (fgColor) nameEl.style.color = fgColor;

      const actsEl = document.createElement('div');
      actsEl.className = 'card-acts';
      const editBtn = document.createElement('button');
      editBtn.className = 'btn sm ghost icon'; editBtn.title = 'Edit'; editBtn.textContent = '✎';
      editBtn.addEventListener('click', () => openEdit(row));
      const delBtn = document.createElement('button');
      delBtn.className = 'btn sm danger icon'; delBtn.title = 'Delete'; delBtn.textContent = '✕';
      delBtn.addEventListener('click', () => openDel(row));
      actsEl.appendChild(editBtn);
      actsEl.appendChild(delBtn);

      nameRow.appendChild(nameEl);
      nameRow.appendChild(actsEl);
      card.appendChild(nameRow);

      // ── Fields grid (cols 1–3, copyable, RTL)
      const fieldsEl = document.createElement('div');
      fieldsEl.className = 'card-fields';
      S.headers.forEach((h, i) => {
        if (i === 0) return;
        const val   = row.values[i] || '';
        const block = document.createElement('div');
        block.className = 'cf-block';
        const label = document.createElement('div');
        label.className = 'cf-label'; label.textContent = h;
        const valEl = document.createElement('div');
        valEl.className = 'cf-val' + (val ? '' : ' empty');
        valEl.dir = 'rtl';
        valEl.textContent = val || '—';
        if (val) valEl.addEventListener('click', () => copyCell(valEl, val));
        block.appendChild(label);
        block.appendChild(valEl);
        fieldsEl.appendChild(block);
      });
      card.appendChild(fieldsEl);
      cardList.appendChild(card);
    });

    body.appendChild(cardList);
    groupEl.appendChild(body);
    container.appendChild(groupEl);
  });
}

/* ── COPY ── */
function copyCell(el, val) {
  if (!val || val === '—') return;
  navigator.clipboard.writeText(val).then(() => {
    el.classList.add('copied');
    setTimeout(() => el.classList.remove('copied'), 700);
    const preview = val.replace(/\n/g,' ');
    toast('Copied — ' + (preview.length > 30 ? preview.slice(0,30)+'…' : preview), 'copy');
  }).catch(() => toast('Copy failed', 'err'));
}

/* ═══════════════════════════════════════════════════════════
   ADD / EDIT
   ═══════════════════════════════════════════════════════════ */
function buildCatPicker(selectedCat) {
  S.editCat = selectedCat;
  return `
    <div class="field">
      <label>Category</label>
      <div class="cat-picker" id="cat-picker">
        ${Object.entries(CAT).map(([k, v]) =>
          `<button type="button" class="cat-btn${selectedCat===k?' active-'+k.toLowerCase():''}" data-cat="${k}"
            style="border-color:${selectedCat===k?v.color:''}; color:${selectedCat===k?v.color:''}">
            ${v.label}
          </button>`
        ).join('')}
      </div>
    </div>`;
}

function attachCatPicker() {
  document.querySelectorAll('#cat-picker .cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      S.editCat = btn.dataset.cat;
      // Re-render picker
      const picker = document.getElementById('cat-picker');
      picker.querySelectorAll('.cat-btn').forEach(b => {
        const k   = b.dataset.cat;
        const def = CAT[k];
        const on  = k === S.editCat;
        b.className = `cat-btn${on ? ' active-' + k.toLowerCase() : ''}`;
        b.style.borderColor = on ? def.color : '';
        b.style.color       = on ? def.color : '';
      });
    });
  });
}

function openAdd() {
  S.editRow = null; S.editCat = 'General';
  document.getElementById('modal-title').textContent = 'Add row';
  document.getElementById('modal-fields').innerHTML =
    buildCatPicker('General') +
    S.headers.map((h, i) => `
      <div class="field">
        <label>${xe(h)}</label>
        <textarea id="f${i}" placeholder="—" autocomplete="off" rows="2" dir="rtl"></textarea>
      </div>`).join('');
  attachCatPicker();
  open_('edit-overlay');
  setTimeout(() => document.getElementById('f0')?.focus(), 100);
}

function openEdit(row) {
  S.editRow = row; S.editCat = row.cat;
  document.getElementById('modal-title').textContent = 'Edit row';
  document.getElementById('modal-fields').innerHTML =
    buildCatPicker(row.cat) +
    S.headers.map((h, i) => `
      <div class="field">
        <label>${xe(h)}</label>
        <textarea id="f${i}" placeholder="—" autocomplete="off" rows="2" dir="rtl">${xe(row.values[i]||'')}</textarea>
      </div>`).join('');
  attachCatPicker();
  open_('edit-overlay');
  setTimeout(() => document.getElementById('f0')?.focus(), 100);
}

async function saveRow() {
  const vals = S.headers.map((_, i) => document.getElementById('f'+i)?.value || '');
  const cat  = S.editCat;
  const rgb  = CAT[cat]?.rgb || CAT.General.rgb;
  close_('edit-overlay');
  showLoader('Saving…');
  try {
    if (!S.editRow) {
      // Append row
      await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: SHEET_ID, range: S.sheetName,
        valueInputOption: 'USER_ENTERED', insertDataOption: 'INSERT_ROWS',
        resource: { values: [vals] },
      });
      // We need to know the new row's index to color it — get it by reloading
      // First, set color on the last row after reload
      await loadData();
      // Find the newly added row (last matching values)
      const added = [...S.rows].reverse().find(r =>
        r.values[0] === vals[0] && r.values[1] === vals[1]
      );
      if (added) await setCellColor(added.sheetRow, rgb);
      toast('Row added', 'ok');
    } else {
      // Update values
      await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SHEET_ID,
        range: `${S.sheetName}!A${S.editRow.sheetRow}`,
        valueInputOption: 'USER_ENTERED',
        resource: { values: [vals] },
      });
      // Update color if category changed
      if (cat !== S.editRow.cat) {
        await setCellColor(S.editRow.sheetRow, rgb);
      }
      toast('Row updated', 'ok');
    }
    await loadData();
  } catch(e) { toast('Save failed: ' + (e.result?.error?.message || e.message || e), 'err'); }
  finally { hideLoader(); }
}

/* ── SET CELL BACKGROUND COLOR ── */
async function setCellColor(sheetRow, rgb) {
  // sheetRow is 1-based (row 1 = header, row 2 = first data row)
  await gapi.client.sheets.spreadsheets.batchUpdate({
    spreadsheetId: SHEET_ID,
    resource: {
      requests: [{
        repeatCell: {
          range: {
            sheetId:         TARGET_GID,
            startRowIndex:   sheetRow - 1, // 0-based
            endRowIndex:     sheetRow,
            startColumnIndex: 0,
            endColumnIndex:   1,
          },
          cell: {
            userEnteredFormat: {
              backgroundColor: {
                red:   rgb[0] / 255,
                green: rgb[1] / 255,
                blue:  rgb[2] / 255,
              }
            }
          },
          fields: 'userEnteredFormat.backgroundColor'
        }
      }]
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   DELETE
   ═══════════════════════════════════════════════════════════ */
function openDel(row) { S.delRow = row; open_('del-overlay'); }

async function confirmDelete() {
  const row = S.delRow;
  close_('del-overlay'); showLoader('Deleting…');
  try {
    await gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId: SHEET_ID,
      resource: { requests: [{ deleteDimension: {
        range: {
          sheetId:    TARGET_GID,
          dimension:  'ROWS',
          startIndex: row.sheetRow - 1, // 0-based
          endIndex:   row.sheetRow,
        }
      }}]},
    });
    toast('Row deleted', 'ok');
    await loadData();
  } catch(e) { toast('Delete failed: ' + (e.result?.error?.message || e.message || e), 'err'); }
  finally { hideLoader(); }
}

/* ── UI HELPERS ── */
const open_      = id => document.getElementById(id).classList.add('open');
const close_     = id => document.getElementById(id).classList.remove('open');
const showLoader = msg => { document.getElementById('loader-msg').textContent = msg; document.getElementById('loader').style.display = 'flex'; };
const hideLoader = ()  => document.getElementById('loader').style.display = 'none';

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="t-dot"></div><span>${xe(msg)}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function xe(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { close_('edit-overlay'); close_('del-overlay'); }
});
document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);
</script>
